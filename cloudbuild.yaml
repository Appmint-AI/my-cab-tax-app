# Cloud Build trigger: use "Cloud Build configuration file" with path `cloudbuild.yaml`
# (not "Autodetected Dockerfile" alone), so this pipeline also pushes the image and deploys Cloud Run.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mycabtax-usa:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mycabtax-usa:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mycabtax-usa'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mycabtax-usa:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--port'
      - '8080'
